trigger:
- main

pool:
  name: may-pool

stages:

- stage: Build
  displayName: Build React App
  jobs:
  - job: BuildJob
    steps:

    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: Install Node.js

    - script: npm install --legacy-peer-deps
      displayName: Install Dependencies

    - script: npm run build
      displayName: Build App