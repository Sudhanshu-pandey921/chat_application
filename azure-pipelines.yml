trigger:
- main

pool:
  name: may-pool

steps:

# ======================
# 1. SOURCE
# ======================
- checkout: self

# ======================
# 2. NODE
# ======================
- task: NodeTool@0
  inputs:
    versionSpec: '16.x'
  displayName: Install Node.js

# ======================
# 3. INSTALL
# ======================
- script: npm install
  displayName: Install Dependencies

# ======================
# 4. BUILD
# ======================
- script: npm run build
  displayName: Build App

# ======================
# 5. PUBLISH ARTIFACT
# ======================
- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: 'build'
    artifactName: 'app'
  displayName: Publish Artifact

# ======================
# 6. DOWNLOAD ARTIFACT ON VM SIDE (FIX)
# ======================
- task: SSH@0
  inputs:
    sshEndpoint: 'vm-ssh'
    runOptions: 'commands'
    commands: |
      sudo rm -rf /var/www/chat-application/*

      # correct way: copy from agent via download not path
      echo "Deploying files..."

  displayName: Prepare VM

# ======================
# 7. ACTUAL COPY (FIXED WAY)
# ======================
- task: CopyFilesOverSSH@0
  inputs:
    sshEndpoint: 'vm-ssh'
    sourceFolder: 'build'
    contents: '**'
    targetFolder: '/var/www/chat-application'
    cleanTargetFolder: true
  displayName: Copy Build to VM

# ======================
# 8. RESTART NGINX
# ======================
- task: SSH@0
  inputs:
    sshEndpoint: 'vm-ssh'
    runOptions: 'commands'
    commands: |
      sudo systemctl restart nginx
  displayName: Restart Nginx