trigger:
- main

pool:
  name: may-pool

stages:

- stage: Build
  jobs:
  - job: BuildJob
    steps:

    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: |
        rmdir /s /q node_modules
        del package-lock.json
        npm install --legacy-peer-deps
      displayName: Install Dependencies

    - script: |
        npm run build
      displayName: Build App

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: 'build'
        artifactName: 'app'