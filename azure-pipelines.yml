trigger:
- main

pool:
  name: may-pool

steps:

- checkout: self

- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: Install Node.js

- script: npm install
  displayName: Install Dependencies

- script: |
    set NODE_OPTIONS=--openssl-legacy-provider
    npm run build
  displayName: Build App

